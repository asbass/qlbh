name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Mỗi khi bạn push vào nhánh main, nó tự chạy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ltw:latest
      - name: Update Kubernetes manifests
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Clone repo k8s
          git clone https://${{ secrets.GIT_PAT }}@github.com/asbass/k8s.git
          
          # Sửa file deployment.yaml (Đảm bảo đường dẫn này đúng với thư mục trong repo k8s của bạn)
          # Lưu ý: Sửa 'taibaton/ltw:latest' thành image của bạn
          sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ltw:latest|g" k8s/backend/deployment.yaml
          
          # Đẩy thay đổi về repo k8s
          cd k8s
          git add .
          git commit -m "Auto-update image tag"
          git push
